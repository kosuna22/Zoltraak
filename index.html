<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>프리렌사마...</title>
</head>
<body>
    <div id="guide" aria-hidden="true">
        <svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
            <circle cx="125" cy="125" r="100" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M125 55 L168 192 L59 92 L192 92 L82 192 Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <canvas id="draw-canvas"></canvas>
    <p id="hint">마법진의 원을 먼저 그려주세요</p>

    <div id="flash" class="hidden" aria-hidden="true">
        <div class="flash-core"></div>
        <div class="flash-ring"></div>
    </div>

    <div id="overlay" class="hidden" aria-hidden="true">
        <video id="spell-video" src="졸트라크.mp4" playsinline></video>
    </div>
    <audio id="spell-audio" src="Zoltraak.mp3" preload="auto"></audio>

    <script type="module" src="js/spell.js"></script>
</body>
</html>
